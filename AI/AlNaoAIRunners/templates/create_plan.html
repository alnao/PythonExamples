{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h4 class="card-title"><i class="fa-solid fa-plus"></i> Create New Plan</h4>
        <form action="{{ url_for('create_plan') }}" method="POST">
            <div class="row mb-3">
                <div class="col-md-3">
                    <label>Plan Title</label>
                    <input type="text" name="title" class="form-control" placeholder="My Plan Title"
                        value="{{ cloned_plan.title if cloned_plan else '' }}">
                </div>
                <div class="col-md-3">
                    <label>Schedule Time (UTC)</label>
                    <input type="datetime-local" name="schedule_time" class="form-control"
                        value="{{ cloned_plan.schedule_time.strftime('%Y-%m-%dT%H:%M') if cloned_plan else now }}">
                </div>
                <div class="col-md-2">
                    <label>Main Branch</label>
                    <input type="text" name="branch" class="form-control" required placeholder="main"
                        value="{{ cloned_plan.branch if cloned_plan else default_branch }}">
                </div>
                <div class="col-md-2">
                    <label>Work Branch</label>
                    <input type="text" name="work_branch" class="form-control" placeholder="alnao-ai-agent"
                        value="{{ cloned_plan.work_branch if cloned_plan else default_work_branch }}">
                </div>
                <div class="col-md-2">
                    <label>Base Directory</label>
                    <input type="text" name="base_dir" class="form-control" placeholder="/mnt/Dati4/todel/"
                        value="{{ cloned_plan.base_dir if cloned_plan else default_base_dir }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Repository URL</label>
                    <input type="text" name="repo_url" class="form-control" placeholder="git@github.com:user/repo.git"
                        value="{{ cloned_plan.repo_url if cloned_plan else default_repo_url }}">
                </div>
                <div class="col-md-2">
                    <label>Push Finale</label>
                    <div>
                        <div class="form-check form-check-inline mt-2">
                            <input class="form-check-input" type="radio" name="push_final" id="push_yes" value="yes"
                                {{ 'checked' if not cloned_plan or cloned_plan.push_final else '' }}>
                            <label class="form-check-label small" for="push_yes">Sì</label>
                        </div>
                        <div class="form-check form-check-inline mt-2">
                            <input class="form-check-input" type="radio" name="push_final" id="push_no" value="no"
                                {{ 'checked' if cloned_plan and not cloned_plan.push_final else '' }}>
                            <label class="form-check-label small" for="push_no">No</label>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <label>Global Commit Prefix</label>
                    <input type="text" name="commit_prefix" class="form-control" placeholder="feat: my feature"
                        value="{{ cloned_plan.commit_prefix if cloned_plan else '' }}">
                </div>
                <div class="col-md-3">
                    <label>Global Commit Suffix</label>
                    <input type="text" name="commit_suffix" class="form-control" placeholder=" - alnao-ai-runner"
                        value="{{ cloned_plan.commit_suffix if cloned_plan else ' - alnao-ai-runner' }}">
                </div>

            </div>

            <div class="row mb-3">
                <div class="col-md-12">
                    <label>Messaggio Comune (Appeso alla fine di tutti i prompt)</label>
                    <textarea name="common_message" class="form-control" rows="2" placeholder="Testo comune da aggiungere a tutti i prompt..."
                        >{{ cloned_plan.common_message if cloned_plan and cloned_plan.common_message else '' }}</textarea>
                </div>
            </div>

            <h5 class="mt-4 border-bottom pb-2">Tasks (Max 15)</h5>
            <div class="container-fluid">
                <div class="row fw-bold text-muted small mb-2">
                    <div class="col-md-1">#</div>
                    <div class="col-md-2">Agent & Model</div>
                    <div class="col-md-5">Prompt</div>
                    <div class="col-md-4">Commit Message & Options</div>
                </div>

                {% for i in range(1, 16) %}
                {% set ctask = cloned_tasks[i-1] if cloned_tasks|length >= i else None %}
                <div class="row mb-3 border-bottom pb-3">
                    <div class="col-md-1">
                        <label class="col-form-label">{{ i }}</label>
                    </div>
                    <div class="col-md-2">
                        <select name="agent_{{ i }}" class="form-select form-select-sm mb-1">
                            <option value="DefaultAgent">Default</option>
                            <option value="Analyst" {{ 'selected' if ctask and ctask.agent=='Analyst' }}>Analyst
                            </option>
                            <option value="Coder" {{ 'selected' if ctask and ctask.agent=='Coder' }}>Coder</option>
                            <option value="Reviewer" {{ 'selected' if ctask and ctask.agent=='Reviewer' }}>Reviewer
                            </option>
                            <option value="Caveman" {{ 'selected' if ctask and ctask.agent=='Caveman' }}>Caveman
                            </option>
                        </select>
                        <select name="model_{{ i }}" class="form-select form-select-sm">
                            {% for group, models in available_models.items() %}
                            <optgroup label="{{ group }}">
                                {% for val, label in models.items() %}
                                <option value="{{ val }}" {{ 'selected' if ctask and ctask.model==val }}>{{ label }}
                                </option>
                                {% endfor %}
                            </optgroup>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-5">
                        <textarea name="prompt_{{ i }}" class="form-control form-control-sm" rows="2"
                            placeholder="Task prompt...">{{ ctask.prompt if ctask else '' }}</textarea>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="commit_msg_{{ i }}" class="form-control form-control-sm mb-1"
                            placeholder="Step commit description..." value="{{ ctask.commit_msg if ctask else '' }}">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="commit_after_task_{{ i }}"
                                id="commit_yes_{{ i }}" value="yes" {{ 'checked' if not ctask or ctask.commit_after_task
                                else '' }}>
                            <label class="form-check-label small" for="commit_yes_{{ i }}">Esegui Commit (Sì)</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="commit_after_task_{{ i }}"
                                id="commit_no_{{ i }}" value="no" {{ 'checked' if ctask and not ctask.commit_after_task
                                else '' }}>
                            <label class="form-check-label small" for="commit_no_{{ i }}">No Commit</label>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success"><i class="fa-solid fa-save"></i> Save Plan</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
