<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS Polly - FastAPI Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h3 mb-3">
                <i class="fa-solid fa-volume-high text-primary"></i>
                AWS Polly Text-to-Speech
              </h1>
              <p class="text-muted">FastAPI + Bootstrap 5 + Font Awesome example.</p>

              <form id="tts-form" class="vstack gap-3">
                <div>
                  <label for="voice" class="form-label">Voice</label>
                  <select id="voice" class="form-select" required>
                    <option value="">Loading voices...</option>
                  </select>
                </div>

                <div>
                  <label for="text" class="form-label">Text</label>
                  <textarea
                    id="text"
                    class="form-control"
                    rows="6"
                    minlength="1"
                    maxlength="1000"
                    required
                    placeholder="Type the text to synthesize..."
                  ></textarea>
                </div>

                <div class="d-grid">
                  <button type="submit" id="submit" class="btn btn-primary">
                    <i class="fa-solid fa-play"></i>
                    Synthesize & Play
                  </button>
                </div>
              </form>

              <div id="message" class="alert d-none mt-3" role="alert"></div>
              <audio id="player" controls class="w-100 mt-3"></audio>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const messageEl = document.getElementById("message");
      const voiceEl = document.getElementById("voice");
      const formEl = document.getElementById("tts-form");
      const playerEl = document.getElementById("player");

      function showMessage(text, type = "danger") {
        messageEl.className = `alert alert-${type} mt-3`;
        messageEl.textContent = text;
      }

      async function loadVoices() {
        try {
          const response = await fetch("/voices");
          if (!response.ok) {
            throw new Error(`Failed to load voices (${response.status})`);
          }

          const voices = await response.json();
          const options = ["<option value=''>Choose a voice...</option>"];
          voices.forEach((voice) => {
            options.push(
              `<option value="${voice.Id}">${voice.Name} (${voice.Gender}, ${voice.LanguageName})</option>`
            );
          });
          voiceEl.innerHTML = options.join("");
        } catch (error) {
          showMessage(error.message);
          voiceEl.innerHTML = "<option value=''>Unable to load voices</option>";
        }
      }

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        messageEl.classList.add("d-none");

        const voiceId = voiceEl.value;
        const text = document.getElementById("text").value.trim();

        if (!voiceId || !text) {
          showMessage("Please choose a voice and enter some text.", "warning");
          return;
        }

        const params = new URLSearchParams({
          voiceId,
          text,
          outputFormat: "mp3",
        });

        try {
          const response = await fetch(`/synthesize?${params.toString()}`);
          if (!response.ok) {
            const details = await response.text();
            throw new Error(`Synthesis failed (${response.status}): ${details}`);
          }

          const audioBlob = await response.blob();
          const audioUrl = URL.createObjectURL(audioBlob);
          playerEl.src = audioUrl;
          await playerEl.play();
          showMessage("Audio generated successfully.", "success");
        } catch (error) {
          showMessage(error.message);
        }
      });

      loadVoices();
    </script>
  </body>
</html>
