<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AWS Polly - 02_saveMp3Rest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" crossorigin="anonymous" />
  <style>
    body { background: #f5f7fb; }
    .header-bar { background: linear-gradient(135deg, #232f3e 0%, #1a6b96 100%); }
    pre { background: #151922; color: #d6deeb; border-radius: .5rem; min-height: 220px; }
  </style>
</head>
<body>
  <div class="header-bar text-white py-3 mb-4">
    <div class="container d-flex align-items-center gap-3">
      <i class="fa-solid fa-wave-square fa-2x"></i>
      <div>
        <h4 class="mb-0">AWS Polly - 02_saveMp3Rest</h4>
        <small class="opacity-75">API REST per sintetizzare elenco e salvare MP3 su S3</small>
      </div>
    </div>
  </div>

  <div class="container pb-4">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <h5 class="card-title"><i class="fa-solid fa-code me-2 text-primary"></i>Test rapido endpoint REST</h5>
        <p class="text-muted">Modifica il JSON e invia verso <code>POST /api/synthesize</code>.</p>
        <textarea id="payload" class="form-control" rows="14"></textarea>
        <div class="mt-3 d-flex gap-2">
          <button class="btn btn-success" onclick="sendPayload()"><i class="fa-solid fa-paper-plane me-1"></i>Invia</button>
          <button class="btn btn-outline-secondary" onclick="resetPayload()"><i class="fa-solid fa-rotate-left me-1"></i>Reset esempio</button>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body">
        <h5 class="card-title"><i class="fa-solid fa-receipt me-2 text-secondary"></i>Risposta API</h5>
        <pre id="response" class="p-3 mb-0">Nessuna richiesta inviata.</pre>
      </div>
    </div>
  </div>

  <script>
    const samplePayload = {
      voice_id: 'Bianca',
      engine: 'neural',
      items: [
        {
          id: '1',
          uuid: '11111111-1111-1111-1111-111111111111',
          nome: 'benvenuto',
          pathS3: 'my-polly-bucket',
          keyS3: 'audio/benvenuto.mp3',
          testoDaLeggere: 'Benvenuto nel sistema Polly REST.'
        }
      ]
    };

    function resetPayload() {
      document.getElementById('payload').value = JSON.stringify(samplePayload, null, 2);
    }

    async function sendPayload() {
      const output = document.getElementById('response');
      try {
        const payload = JSON.parse(document.getElementById('payload').value);
        output.textContent = 'Invio richiesta...';
        const res = await fetch('/api/synthesize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        output.textContent = JSON.stringify({ status: res.status, body: data }, null, 2);
      } catch (err) {
        output.textContent = 'Errore: ' + err.message;
      }
    }

    resetPayload();
  </script>
</body>
</html>
